<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret // 保險箱 </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Rajdhani', 'Noto Sans TC', sans-serif;
            background-color: #050508;
            letter-spacing: 0.05em;
        }
        .rog-panel {
            background-color: #0b0c10;
            border: 2px solid #1f232d;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            position: relative;
        }
        .rog-panel::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 16px;
            height: 16px;
            background: #050508;
            border-bottom: 2px solid #1f232d;
            border-right: 2px solid #1f232d;
            z-index: 10;
        }
        .rog-input {
            font-family: 'Orbitron', monospace;
            background-color: #10121a;
            border: 1px solid #2a2f3d;
            transition: all 0.2s ease;
        }
        .rog-input:focus {
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
            outline: none;
        }
        .cyber-font { font-family: 'Orbitron', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .copy-toast {
            font-family: 'Orbitron', sans-serif;
            animation: cyberPop 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            background: #ffffff;
            color: #000000;
        }
        @keyframes cyberPop {
            0% { opacity: 0; transform: translateY(5px) scaleX(0.8); }
            10% { opacity: 1; transform: translateY(0) scaleX(1); }
            90% { opacity: 1; transform: translateY(0) scaleX(1); }
            100% { opacity: 0; transform: translateY(-4px) scaleX(0.9); }
        }
    </style>
</head>
<body class="text-slate-300 antialiased p-4 md:p-8 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-6xl rog-panel rounded-xl overflow-hidden grid grid-cols-1 md:grid-cols-12 min-h-[650px]">
        
        <div class="md:col-span-4 border-b-2 md:border-b-0 md:border-r-2 border-slate-900 p-6 flex flex-col justify-between bg-[#0e1017]">
            <div>
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-2.5">
                        <i data-lucide="terminal" class="w-5 h-5 text-white"></i>
                        <div>
                            <h1 class="font-black text-base tracking-widest text-white cyber-font">PUCKY VAULT</h1>
                            <p class="text-[10px] text-slate-500 tracking-widest uppercase cyber-font">DRIVE-SYNC.SYS</p>
                        </div>
                    </div>
                    <div class="h-1 w-12 bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)] rounded-full"></div>
                </div>

                <div class="bg-[#121520] border border-slate-800 rounded p-3 mb-4 space-y-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest cyber-font">// DRIVE LINK // 雲端硬碟連結</p>
                    <div class="flex flex-col gap-2">
                        <button id="authBtn" onclick="handleAuthClick()" class="w-full bg-red-600 hover:bg-red-700 text-white text-[11px] font-bold py-1.5 px-2 rounded tracking-wider cyber-font text-center cursor-pointer transition-colors flex items-center justify-center gap-1">
                            <i data-lucide="log-in" class="w-3.5 h-3.5"></i> CONNECT GOOGLE DRIVE
                        </button>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="exportToChromeCSV()" class="bg-white hover:bg-slate-200 text-black text-[10px] font-bold py-1.5 px-2 rounded tracking-wider cyber-font text-center cursor-pointer transition-colors">
                                匯出
                            </button>
                            <button onclick="document.getElementById('importFile').click()" class="border border-slate-700 hover:border-white text-white text-[10px] font-bold py-1.5 px-2 rounded tracking-wider cyber-font text-center cursor-pointer transition-colors">
                                匯入
                            </button>
                            <input type="file" id="importFile" class="hidden" accept=".csv" onchange="importFromChromeCSV(event)">
                        </div>
                    </div>
                </div>

                <div class="border-b border-slate-800/80 my-3"></div>

                <h3 class="text-xs font-bold tracking-widest text-white mb-3 uppercase cyber-font">// FORTIFY YOUR VAULT</h3>
                
                <form id="vaultForm" onsubmit="saveCredentials(event)" class="space-y-3.5 text-xs">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest cyber-font">name // 網站服務名稱 </label>
                        <input type="text" id="siteName" required placeholder="Google, Steam, Netflix" class="w-full rog-input rounded py-2 px-3 text-slate-200 placeholder-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest cyber-font">url // 登入網址 (可選，留空則自動補齊)</label>
                        <input type="text" id="siteUrl" placeholder="https://google.com" class="w-full rog-input rounded py-2 px-3 text-slate-200 placeholder-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest cyber-font">username // 帳號</label>
                        <input type="text" id="siteUser" required placeholder="gamer_1337@email.com" class="w-full rog-input rounded py-2 px-3 text-slate-200 placeholder-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest cyber-font">password // 密碼</label>
                        <div class="relative">
                            <input type="password" id="sitePassword" required placeholder="••••••••••••" class="w-full rog-input rounded py-2 px-3 pr-10 text-slate-200 placeholder-slate-700">
                            <button type="button" onclick="toggleInputPasswordVisibility()" class="absolute right-3 top-2.5 text-slate-500 hover:text-white transition-colors cursor-pointer">
                                <i data-lucide="eye" id="inputPasswordEye" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-white hover:bg-slate-200 text-black py-2.5 rounded font-bold tracking-widest transition-all uppercase cyber-font flex items-center justify-center gap-2 cursor-pointer active:scale-[0.98]">
                        STORE CREDENTIALS
                    </button>
                </form>
            </div>

            <div class="mt-6 p-2.5 bg-[#11131c] border border-slate-900 rounded text-[10px] text-slate-500 cyber-font flex items-center gap-2">
                <span id="syncPulse" class="w-1.5 h-1.5 bg-red-500 rounded-full shadow-[0_0_6px_rgba(239,68,68,0.8)]"></span>
                <span id="engineStatus">DRIVE DISCONNECTED</span>
            </div>
        </div>

        <div class="md:col-span-8 p-6 flex flex-col justify-between bg-[#0b0c10]">
            
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                <div>
                    <h2 class="text-base font-bold text-white tracking-widest uppercase cyber-font">DECRYPTED CREDENTIALS // 保險箱</h2>
                    <p class="text-[10px] text-slate-500 mt-0.5">PASSWORD STANDARD //  (雙擊欄位快速複製)</p>
                </div>
                
                <div class="relative w-full sm:w-52">
                    <i data-lucide="search" class="w-3.5 h-3.5 text-slate-600 absolute left-3 top-2.5"></i>
                    <input type="text" id="searchInput" oninput="renderVault()" placeholder="SEARCH..." class="w-full rog-input rounded py-1.5 pl-8 pr-3 text-xs text-slate-200 placeholder-slate-700">
                </div>
            </div>

            <div class="flex-1 overflow-y-auto max-h-[460px] no-scrollbar pr-1">
                <div class="w-full border border-slate-900 bg-[#0d1017] rounded overflow-hidden">
                    <div class="overflow-x-auto w-full">
                        <table class="w-full text-left text-xs min-w-[500px] table-fixed">
                            <thead class="bg-[#12151f] text-slate-400 font-bold tracking-widest uppercase border-b-2 border-slate-900 text-[10px] cyber-font">
                                <tr>
                                    <th class="py-3 px-3 w-[25%]">// SERVICE</th>
                                    <th class="py-3 px-3 w-[30%]">// USERNAME</th>
                                    <th class="py-3 px-3 w-[25%]">// PASSWORD</th>
                                    <th class="py-3 px-3 w-[20%] text-right">// ACTIONS</th>
                                </tr>
                            </thead>
                            <tbody id="vaultTableBody" class="divide-y divide-slate-900">
                                </tbody>
                        </table>
                    </div>
                    
                    <div id="emptyState" class="hidden py-24 flex flex-col items-center justify-center text-slate-700 cyber-font">
                        <i data-lucide="unplug" class="w-8 h-8 mb-2 stroke-1"></i>
                        <p class="text-[11px] uppercase tracking-widest">NO DATA FOUND</p>
                    </div>
                </div>
            </div>

            <div class="mt-4 pt-3 border-t border-slate-900 flex items-center justify-between text-[11px] text-slate-600 cyber-font tracking-wider">
                <span>LOCAL_DATABASE_LINKED_SUCCESS</span>
                <span>TOTAL_KEYS: <span id="totalCount" class="text-white font-bold">0</span></span>
            </div>
        </div>
    </div>

    <script>
        // 🔒 請在下方替換成你從 Google Cloud Console 申請到的 用戶端 ID
        const CLIENT_ID = '420264907247-hvtrma6b2upt6l7eio5gj6n3hj2s63se.apps.googleusercontent.com';
        
        // 僅請求 appDataFolder 權限，確保安全隔離，使用者看不到此隱藏資料夾
        const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
        const FILE_NAME = 'rog_vault_chrome_db.json';

        let vaultData = JSON.parse(localStorage.getItem('rog_cyber_storage_db')) || [];
        let tokenClient;
        let gapiInited = false;
        let gisiInited = false;
        let driveFileId = null; 

        let editingId = null;

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            renderVault();
            // 初始化 Google 載入模組
            gapiLoad();
            gisLoad();
        });

        // --- Google Drive 自動聯網與認證模組 ---
        function gapiLoad() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() {
            await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
            gapiInited = true;
            maybeEnableAuth();
        }
        function gisLoad() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES, callback: '', // 稍後動態分配
            });
            gisiInited = true;
            maybeEnableAuth();
        }
        function maybeEnableAuth() {
            if (gapiInited && gisiInited) {
                document.getElementById('authBtn').innerText = "CONNECT TO GOOGLE DRIVE";
                // 🚀 自動嘗試靜態讀取已存在瀏覽器的 Token，達到「打開就全自動嘗試聯動」
                const savedToken = JSON.parse(localStorage.getItem('gdrive_token'));
                if (savedToken && savedToken.expires_at > Date.now()) {
                    gapi.client.setToken(savedToken);
                    onDriveConnected();
                }
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                // 儲存憑證
                resp.expires_at = Date.now() + (resp.expires_in * 1000);
                localStorage.setItem('gdrive_token', JSON.stringify(resp));
                await onDriveConnected();
            };

            // 如果沒有憑證或過期，跳出登入選擇視窗
            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'select_account'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        async function onDriveConnected() {
            document.getElementById('authBtn').className = "w-full bg-emerald-600 text-white text-[11px] font-bold py-1.5 px-2 rounded tracking-wider cyber-font text-center transition-colors flex items-center justify-center gap-1";
            document.getElementById('authBtn').innerHTML = `<i data-lucide="cloud-check" class="w-3.5 h-3.5"></i> DRIVE LINKED SUCCESS`;
            document.getElementById('syncPulse').className = "w-1.5 h-1.5 bg-emerald-500 rounded-full shadow-[0_0_6px_rgba(16,185,129,0.8)] animate-pulse";
            document.getElementById('engineStatus').innerText = "CLOUD AUTO-SYNC ENABLED";
            lucide.createIcons();
            await syncWithGoogleDrive();
        }

        // --- 核心雲端資料庫儲存與建立機制 ---
        async function syncWithGoogleDrive() {
            try {
                // 1. 去雲端硬碟的專用隱藏區查找有無對應的檔案
                const response = await gapi.client.drive.files.list({
                    spaces: 'appDataFolder', q: `name = '${FILE_NAME}'`, fields: 'files(id, name)'
                });
                const files = response.result.files;

                if (files.length > 0) {
                    // 2. 檔案存在，下載下來與本地合併
                    driveFileId = files[0].id;
                    const fileData = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
                    let cloudData = fileData.result;
                    if (typeof cloudData === 'string' && cloudData.trim()) cloudData = JSON.parse(cloudData);
                    
                    if (Array.isArray(cloudData) && cloudData.length > 0) {
                        // 合併邏輯：以雲端為主，補齊本地沒有的
                        let localIds = new Set(vaultData.map(v => v.id));
                        cloudData.forEach(c => { if(!localIds.has(c.id)) vaultData.push(c); });
                        localStorage.setItem('rog_cyber_storage_db', JSON.stringify(vaultData));
                        renderVault();
                    }
                } else {
                    // 3. 檔案不存在，自動在 Drive 裡面建立一個新的空檔案
                    await saveToGoogleDrive(true);
                }
            } catch (err) {
                console.error("雲端同步失敗", err);
            }
        }

        async function saveToGoogleDrive(isCreate = false) {
            if (!gapiInited || gapi.client.getToken() === null) return;
            try {
                const boundary = 'foo_bar_baz';
                const delimiter = `\r\n--${boundary}\r\n`;
                const close_delim = `\r\n--${boundary}--`;
                const metadata = { 'name': FILE_NAME, 'parents': isCreate ? ['appDataFolder'] : undefined };
                
                let multipartRequestBody =
                    delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(metadata) +
                    delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(vaultData) + close_delim;

                let request;
                if (isCreate || !driveFileId) {
                    request = gapi.client.request({
                        'path': '/upload/drive/v3/files', 'method': 'POST',
                        'params': {'uploadType': 'multipart'},
                        'headers': {'Content-Type': `multipart/related; boundary="${boundary}"`},
                        'body': multipartRequestBody
                    });
                } else {
                    request = gapi.client.request({
                        'path': `/upload/drive/v3/files/${driveFileId}`, 'method': 'PATCH',
                        'params': {'uploadType': 'multipart'},
                        'headers': {'Content-Type': `multipart/related; boundary="${boundary}"`},
                        'body': multipartRequestBody
                    });
                }
                const res = await request;
                if (isCreate && res.result.id) driveFileId = res.result.id;
                console.log("雲端資料同步更新完畢");
            } catch (err) {
                console.error("上傳至雲端失敗", err);
            }
        }

        // --- 核心功能：對齊 Chrome 密碼匯出 CSV 格式 (name, url, username, password) ---
        function exportToChromeCSV() {
            if (vaultData.length === 0) { alert('無任何數據可導出。'); return; }
            
            // 🚀 Chrome 官方標準 4 欄位標頭
            let csvContent = "name,url,username,password\n";

            vaultData.forEach(item => {
                let fallbackUrl = item.url || `https://${item.site.toLowerCase().split(' ')[0]}.com`;
                let row = [item.site, fallbackUrl, item.user, item.pass].map(text => {
                    let sanitized = String(text).replace(/"/g, '""');
                    return `"${sanitized}"`;
                });
                csvContent += row.join(",") + "\n";
            });

            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chrome_passwords_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 核心功能：解析並匯入 Chrome 匯出的 CSV 檔案
        function importFromChromeCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const text = e.target.result;
                    const lines = parseCSV(text);
                    if (lines.length < 2) throw new Error("CSV 檔案內無有效數據。");

                    const headers = lines[0].map(h => h.trim().toLowerCase());
                    const nameIdx = headers.indexOf("name");
                    const urlIdx = headers.indexOf("url");
                    const userIdx = headers.indexOf("username");
                    const passIdx = headers.indexOf("password");

                    if (nameIdx === -1 || userIdx === -1 || passIdx === -1) {
                        throw new Error("格式不符！請確認這是標準的 Chrome 密碼備份 CSV 檔案。");
                    }

                    let parsedData = [];
                    for (let i = 1; i < lines.length; i++) {
                        let row = lines[i];
                        if (row.length < 3 || !row[nameIdx]) continue;
                        
                        parsedData.push({
                            id: Date.now() + i,
                            site: row[nameIdx].trim(),
                            url: urlIdx !== -1 ? row[urlIdx].trim() : "",
                            user: row[userIdx].trim(),
                            pass: row[passIdx]
                        });
                    }

                    if (parsedData.length > 0) {
                        if (confirm(`成功解析！已讀取到 ${parsedData.length} 筆符合 Chrome 規範的憑證，是否將其寫入保險箱？`)) {
                            vaultData = parsedData;
                            localStorage.setItem('rog_cyber_storage_db', JSON.stringify(vaultData));
                            renderVault();
                            // 全自動將最新狀態同步備份到 Google Drive 隱藏夾
                            saveToGoogleDrive();
                            alert('Chrome 資料鏈結同步完成！');
                        }
                    }
                } catch (err) {
                    alert('匯入失敗：' + err.message);
                }
                event.target.value = '';
            };
            reader.readAsText(file, 'utf-8');
        }

        function parseCSV(text) {
            let p = '', r = []; let q = false; let row = [''];
            for (let i = 0; i < text.length; i++) {
                let c = text[i]; let next = text[i+1];
                if (c === '"') {
                    if (q && next === '"') { row[row.length - 1] += '"'; i++; } else { q = !q; }
                } else if (c === ',' && !q) { row.push(''); }
                else if ((c === '\r' || c === '\n') && !q) {
                    if (c === '\r' && next === '\n') { i++; }
                    r.push(row); row = [''];
                } else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== '') r.push(row);
            return r;
        }

        function toggleInputPasswordVisibility() {
            const input = document.getElementById('sitePassword');
            const icon = document.getElementById('inputPasswordEye');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.setAttribute('data-lucide', input.type === 'password' ? 'eye-off' : 'eye');
            lucide.createIcons();
        }

        function renderVault() {
            const tbody = document.getElementById('vaultTableBody');
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filteredData = vaultData.filter(item => item.site.toLowerCase().includes(query) || item.user.toLowerCase().includes(query));
            filteredData.sort((a, b) => a.site.localeCompare(b.site, 'en', { numeric: true, sensitivity: 'base' }));
            document.getElementById('totalCount').innerText = vaultData.length;
            tbody.innerHTML = '';

            if(filteredData.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden'); return;
            } else {
                document.getElementById('emptyState').classList.add('hidden');
            }

            filteredData.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-[#141824] transition-colors group border-l-2 border-transparent hover:border-white';
                
                if (editingId === item.id) {
                    tr.innerHTML = `
                        <td class="py-2 px-3"><input type="text" id="edit-site-${item.id}" value="${item.site}" class="w-full bg-[#1b1f2b] border border-white/40 rounded py-1 px-2 text-xs text-white focus:outline-none font-bold"></td>
                        <td class="py-2 px-3"><input type="text" id="edit-user-${item.id}" value="${item.user}" class="w-full bg-[#1b1f2b] border border-white/40 rounded py-1 px-2 text-xs text-white focus:outline-none"></td>
                        <td class="py-2 px-3 cyber-font"><input type="text" id="edit-pass-${item.id}" value="${item.pass}" class="w-full bg-[#1b1f2b] border border-white/40 rounded py-1 px-2 text-xs text-white focus:outline-none"></td>
                        <td class="py-2 px-3 text-right">
                            <div class="flex items-center justify-end gap-1.5">
                                <button onclick="saveEdit(${item.id})" class="text-white hover:scale-110 transition-transform cursor-pointer"><i data-lucide="check-square" class="w-4 h-4"></i></button>
                                <button onclick="cancelEdit()" class="text-slate-500 hover:text-white transition-colors cursor-pointer"><i data-lucide="x-square" class="w-4 h-4"></i></button>
                            </div>
                        </td>
                    `;
                } else {
                    tr.innerHTML = `
                        <td class="py-3 px-3 font-bold text-white truncate" title="${item.url || ''}">${item.site}</td>
                        <td class="py-3 px-3 text-slate-400 truncate relative cursor-pointer select-none" ondblclick="inlineCopy(this, '${item.user}', 'ID')"><span>${item.user}</span></td>
                        <td class="py-3 px-3 cyber-font relative cursor-pointer select-none" ondblclick="inlineCopy(this, '${item.pass}', 'KEY')">
                            <div class="flex items-center gap-2">
                                <input type="password" id="pw-${item.id}" value="${item.pass}" readonly class="bg-transparent border-none text-slate-500 focus:outline-none w-24 text-xs tracking-widest pointer-events-none select-none">
                                <button onclick="event.stopPropagation(); toggleRowPassword(${item.id})" class="text-slate-600 hover:text-white transition-colors opacity-0 group-hover:opacity-100 cursor-pointer"><i data-lucide="eye" id="eye-${item.id}" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </td>
                        <td class="py-3 px-3 text-right">
                            <div class="flex items-center justify-end gap-1 sm:opacity-40 group-hover:opacity-100 transition-opacity">
                                <button onclick="startEdit(${item.id})" class="p-1 hover:bg-slate-900 rounded text-slate-400 hover:text-white transition-all cursor-pointer" title="編輯"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button>
                                <button onclick="directCopy('${item.pass}', 'KEY')" class="p-1 hover:bg-slate-900 rounded text-slate-400 hover:text-white transition-all cursor-pointer" title="複製密碼"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button>
                                <button onclick="deleteCredential(${item.id})" class="p-1 hover:bg-slate-900 rounded text-slate-400 hover:text-white transition-all cursor-pointer" title="刪除"><i data-lucide="trash" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </td>
                    `;
                }
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        function startEdit(id) { editingId = id; renderVault(); }
        function cancelEdit() { editingId = null; renderVault(); }

        function saveEdit(id) {
            const newSite = document.getElementById(`edit-site-${id}`).value.trim();
            const newUser = document.getElementById(`edit-user-${id}`).value.trim();
            const newPass = document.getElementById(`edit-pass-${id}`).value;
            if (!newSite || !newUser || !newPass) return;

            const targetIndex = vaultData.findIndex(item => item.id === id);
            if (targetIndex !== -1) {
                vaultData[targetIndex].site = newSite;
                vaultData[targetIndex].user = newUser;
                vaultData[targetIndex].pass = newPass;
                localStorage.setItem('rog_cyber_storage_db', JSON.stringify(vaultData));
                saveToGoogleDrive(); // 即時向雲端備份同步
            }
            editingId = null; renderVault();
        }

        function inlineCopy(element, text, label) {
            if (editingId !== null) return;
            navigator.clipboard.writeText(text);
            if (element.querySelector('.copy-toast')) return;
            const toast = document.createElement('span');
            toast.className = 'copy-toast absolute left-3 top-1/2 -translate-y-1/2 text-[9px] font-black px-1.5 py-0.5 rounded shadow-lg z-10 uppercase tracking-widest';
            toast.innerText = `[${label}_COPIED]`;
            element.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 1000);
        }

        function directCopy(text, label) { navigator.clipboard.writeText(text); alert(`[SUCCESS] ${label} 已複製。`); }
        function toggleRowPassword(id) {
            const input = document.getElementById(`pw-${id}`); const icon = document.getElementById(`eye-${id}`);
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.setAttribute('data-lucide', input.type === 'password' ? 'eye' : 'eye-off'); lucide.createIcons();
        }

        function saveCredentials(e) {
            e.preventDefault();
            const site = document.getElementById('siteName').value.trim();
            const url = document.getElementById('siteUrl').value.trim();
            const user = document.getElementById('siteUser').value.trim();
            const pass = document.getElementById('sitePassword').value;

            vaultData.push({ id: Date.now(), site, url, user, pass });
            localStorage.setItem('rog_cyber_storage_db', JSON.stringify(vaultData));
            renderVault();
            saveToGoogleDrive(); // 即時備份至 Drive
            
            document.getElementById('vaultForm').reset();
            document.getElementById('sitePassword').type = 'password';
            document.getElementById('inputPasswordEye').setAttribute('data-lucide', 'eye');
            lucide.createIcons();
        }

        function deleteCredential(id) {
            if(confirm('確定要刪除此憑證嗎？')) {
                vaultData = vaultData.filter(item => item.id !== id);
                localStorage.setItem('rog_cyber_storage_db', JSON.stringify(vaultData));
                renderVault();
                saveToGoogleDrive(); // 即時更新雲端
            }
        }
    </script>
</body>
</html>
