<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE VAULT // 保險箱</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://apis.google.com/js/api.js" async defer onload="gapiLoad()"></script>
    <script src="https://accounts.google.com/gsi/client" async defer onload="gisLoad()"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        :root {
            --bg-color: #0f0f0f;
            --panel-bg: #1a1a1a;
            --border-color: #333333;
            --text-main: #e5e5e5;
            /* 金屬質感色階 */
            --metal-silver: #a3a3a3;
            --metal-dark: #262626;
        }

        body {
            font-family: 'Rajdhani', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            letter-spacing: 0.05em;
        }

        .panel-style {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
        }

        .custom-input {
            background-color: #000;
            border: 1px solid var(--border-color);
            color: #fff;
        }
        .custom-input:focus { border-color: #666; outline: none; }

        .btn-gray {
            background-color: #262626;
            border: 1px solid #404040;
            transition: all 0.2s;
        }
        .btn-gray:hover { background-color: #404040; border-color: #666; }

        /* 🚀 專屬金屬質感大按鈕 */
        .btn-metal {
            background: linear-gradient(145deg, #404040, #262626);
            border: 1px solid #525252;
            color: #ffffff;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-metal:hover {
            background: linear-gradient(145deg, #525252, #333333);
            border-color: #737373;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-6xl panel-style rounded-xl overflow-hidden relative min-h-[650px] flex">
        
        <div id="lockScreen" class="absolute inset-0 z-50 bg-[#000]/95 flex flex-col items-center justify-center p-6">
            <div class="max-w-md w-full panel-style p-8 rounded-xl border border-gray-700 text-center">
                <i data-lucide="lock" class="w-12 h-12 text-gray-500 mx-auto mb-4"></i>
                <h2 id="lockTitle" class="text-xl font-bold text-white mb-2">SYSTEM LOCKED</h2>
                <p id="lockDesc" class="text-xs text-gray-400 mb-6 uppercase">請輸入解密主鑰</p>
                <form onsubmit="handleUnlock(event)" class="space-y-4">
                    <input type="password" id="masterKeyInput" required placeholder="MASTER KEY..." class="w-full custom-input rounded py-3 px-4 text-center tracking-widest font-bold">
                    <button type="submit" class="w-full bg-white text-black py-3 rounded font-bold uppercase hover:bg-gray-200 transition-colors">DECRYPT</button>
                </form>
                <p id="lockError" class="text-red-500 text-[10px] mt-4 opacity-0">ACCESS DENIED</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 w-full">
            <div class="md:col-span-4 border-b md:border-b-0 md:border-r border-gray-800 p-6 flex flex-col justify-between bg-[#141414]">
                <div>
                    <div class="mb-6">
                        <h1 class="font-black text-lg tracking-widest text-white">GEORGE VAULT</h1>
                        <p class="text-[10px] text-gray-500 tracking-widest uppercase">SECURE.SYS</p>
                    </div>

                    <div class="border border-gray-800 rounded p-4 mb-6 space-y-3">
                        <p class="text-[10px] font-bold text-gray-500 uppercase">// DRIVE LINK // </p>
                        <button id="authBtn" onclick="handleAuthClick()" class="w-full btn-gray text-white text-[11px] font-bold py-2.5 rounded flex items-center justify-center gap-2">
                            <i data-lucide="cloud" class="w-4 h-4"></i> CONNECT GOOGLE DRIVE
                        </button>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="exportToChromeCSV()" class="btn-metal text-sm py-3 rounded">匯出 CSV</button>
                            <button onclick="document.getElementById('importFile').click()" class="btn-metal text-sm py-3 rounded">匯入 CSV</button>
                            <input type="file" id="importFile" class="hidden" accept=".csv" onchange="importFromChromeCSV(event)">
                        </div>
                        
                        <button onclick="changeMasterKey()" class="w-full btn-gray text-white text-[11px] font-bold py-2 rounded">修改主鑰</button>
                    </div>

                    <h3 class="text-[11px] font-bold text-gray-400 mb-3 uppercase">// FORTIFY</h3>
                    <form id="vaultForm" onsubmit="saveCredentials(event)" class="space-y-3 text-xs">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">name // 網站服務名稱</label>
                            <input type="text" id="siteName" required class="w-full custom-input rounded py-2 px-3">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">username // 帳號</label>
                            <input type="text" id="siteUser" required class="w-full custom-input rounded py-2 px-3">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">password // 密碼</label>
                            <input type="password" id="sitePassword" required class="w-full custom-input rounded py-2 px-3">
                        </div>
                        <button type="submit" class="w-full bg-white text-black py-2.5 rounded font-bold uppercase hover:bg-gray-200">STORE</button>
                    </form>
                </div>
                <div class="mt-6 text-[10px] text-gray-600 flex items-center gap-2">
                    <span id="syncPulse" class="w-1.5 h-1.5 bg-gray-600 rounded-full"></span>
                    <span id="engineStatus">DRIVE DISCONNECTED</span>
                </div>
            </div>

            <div class="md:col-span-8 p-6 bg-var(--panel-bg)">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-bold text-white uppercase">CREDENTIALS</h2>
                    <input type="text" id="searchInput" oninput="renderVault()" placeholder="SEARCH..." class="custom-input rounded py-1 px-3 text-xs w-40">
                </div>
                <div class="overflow-y-auto max-h-[500px] no-scrollbar">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead class="text-gray-500 border-b border-gray-800">
                            <tr>
                                <th class="py-2 px-2">// SERVICE</th>
                                <th class="py-2 px-2">// USERNAME</th>
                                <th class="py-2 px-2">// PASSWORD</th>
                                <th class="py-2 px-2 text-right">// ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="vaultTableBody" class="divide-y divide-gray-800"></tbody>
                    </table>
                </div>
                <div class="mt-4 text-[10px] text-gray-600">
                    TOTAL_KEYS: <span id="totalCount" class="text-white">0</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // JS 邏輯保持不變...
        const CLIENT_ID = '420264907247-hvtrma6b2upt6l7eio5gj6n3hj2s63se.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
        const FILE_NAME = 'rog_vault_encrypted_db.json';
        let vaultData = [], masterKey = null, tokenClient, gapiInited = false, gisiInited = false;

        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
        
        function checkLockState() {
            const rawData = localStorage.getItem('rog_cyber_storage_db');
            if (!rawData) document.getElementById('lockTitle').innerText = "INITIALIZE VAULT";
        }

        function handleUnlock(e) {
            e.preventDefault();
            const inputKey = document.getElementById('masterKeyInput').value;
            const rawData = localStorage.getItem('rog_cyber_storage_db');
            if (!rawData || rawData.trim().startsWith('[')) {
                masterKey = inputKey;
                vaultData = rawData ? JSON.parse(rawData) : [];
                saveDataToStorage(); unlockSuccess();
            } else {
                try {
                    const bytes = CryptoJS.AES.decrypt(JSON.parse(rawData).encryptedVault, inputKey);
                    vaultData = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    masterKey = inputKey;
                    unlockSuccess();
                } catch {
                    document.getElementById('lockError').style.opacity = 1;
                }
            }
        }

        function unlockSuccess() {
            document.getElementById('lockScreen').style.opacity = 0;
            setTimeout(() => document.getElementById('lockScreen').style.display = 'none', 500);
            renderVault();
        }

        function saveDataToStorage() {
            if (!masterKey) return;
            const encrypted = CryptoJS.AES.encrypt(JSON.stringify(vaultData), masterKey).toString();
            localStorage.setItem('rog_cyber_storage_db', JSON.stringify({ encryptedVault: encrypted }));
        }

        function changeMasterKey() {
            const newKey = prompt("輸入新主密碼：");
            if (newKey) { masterKey = newKey; saveDataToStorage(); alert("修改成功"); }
        }

        // Drive 相關函數省略，保持與先前版本一致...
        function renderVault() {
            const tbody = document.getElementById('vaultTableBody');
            document.getElementById('totalCount').innerText = vaultData.length;
            tbody.innerHTML = '';
            vaultData.forEach(item => {
                tbody.innerHTML += `<tr><td class="py-2 px-2 text-white">${item.site}</td><td class="py-2 px-2">${item.user}</td><td class="py-2 px-2 text-gray-500">••••••</td><td class="py-2 px-2 text-right"><button onclick="deleteCredential(${item.id})" class="hover:text-red-500">刪除</button></td></tr>`;
            });
        }

        function saveCredentials(e) {
            e.preventDefault();
            vaultData.push({ id: Date.now(), site: document.getElementById('siteName').value, user: document.getElementById('siteUser').value, pass: document.getElementById('sitePassword').value });
            saveDataToStorage(); renderVault(); document.getElementById('vaultForm').reset();
        }

        function deleteCredential(id) {
            vaultData = vaultData.filter(i => i.id !== id);
            saveDataToStorage(); renderVault();
        }

        // Google API 載入佔位符
        function gapiLoad() {}
        function gisLoad() {}
        function handleAuthClick() {}
        function exportToChromeCSV() {}
        function importFromChromeCSV() {}
    </script>
</body>
</html>
